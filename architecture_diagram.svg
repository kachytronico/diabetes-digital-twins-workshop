<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg"
     style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:12px 0">
<defs>
  <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/>
  </marker>
</defs>

<!-- Output (top) -->
<rect x="496" y="18" width="164" height="50" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text x="578" y="38" text-anchor="middle" font-size="12" font-weight="500" fill="#4A1B0C">BG trajectory</text>
<text x="578" y="54" text-anchor="middle" font-size="10" fill="#993C1D">(90 min ahead)</text>
<line x1="578" y1="136" x2="578" y2="70" stroke="#993C1D" stroke-width="1" marker-end="url(#arrG)"/>

<!-- Patient history input -->
<rect x="16" y="158" width="132" height="64" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="82" y="184" text-anchor="middle" font-size="12" font-weight="500" fill="#444441">Patient history</text>
<text x="82" y="202" text-anchor="middle" font-size="10.5" fill="#5F5E5A">BG, insulin, carbs</text>
<line x1="148" y1="190" x2="184" y2="190" stroke="#888780" stroke-width="1" marker-end="url(#arrG)"/>

<!-- Encoder -->
<rect x="186" y="136" width="128" height="108" rx="12" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="250" y="185" text-anchor="middle" font-size="13" font-weight="500" fill="#26215C">Encoder</text>
<text x="250" y="203" text-anchor="middle" font-size="10.5" fill="#534AB7">compresses history</text>
<line x1="314" y1="190" x2="348" y2="190" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrG)"/>

<!-- Latent z -->
<ellipse cx="404" cy="190" rx="54" ry="60" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="404" y="186" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Latent z</text>
<text x="404" y="204" text-anchor="middle" font-size="10" fill="#0F6E56">a compact summary</text>
<line x1="458" y1="190" x2="494" y2="190" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrG)"/>

<!-- Decoder -->
<rect x="496" y="136" width="164" height="108" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="578" y="180" text-anchor="middle" font-size="13" font-weight="500" fill="#042C53">Decoder</text>
<text x="578" y="198" text-anchor="middle" font-size="10.5" fill="#185FA5">generates a future</text>
<text x="578" y="213" text-anchor="middle" font-size="10.5" fill="#185FA5">glucose trajectory</text>

<!-- Conditioning + sign constraint (combined) -->
<line x1="578" y1="262" x2="578" y2="244" stroke="#888780" stroke-width="1" marker-end="url(#arrG)"/>
<rect x="420" y="264" width="248" height="80" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="544" y="286" text-anchor="middle" font-size="11.5" font-weight="500" fill="#444441">Insulin &amp; carbs</text>
<text x="544" y="303" text-anchor="middle" font-size="10.5" fill="#5F5E5A">also shape the decoder's output:</text>
<text x="544" y="321" text-anchor="middle" font-size="10.5" font-weight="500" fill="#185FA5">insulin ↓ BG  ·  carbs ↑ BG  (always)</text>

<!-- Footer -->
<text x="16" y="368" font-size="10.5" fill="#888780">At inference the encoder is set aside — the decoder alone samples z, so identical inputs can generate many plausible glucose futures.</text>
</svg>